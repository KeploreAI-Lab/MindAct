name: Build CLI (Windows)

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/build-cli.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/rust/target
          key: windows-cargo-${{ hashFiles('cli/rust/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build physmind.exe
        working-directory: cli/rust
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: physmind-windows-x64
          path: cli/rust/target/x86_64-pc-windows-msvc/release/physmind.exe
          retention-days: 90

      - name: Publish to rolling "latest-windows" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-windows
          name: "Latest Windows Build"
          body: "Auto-updated on every push to main. Download physmind.exe and put it anywhere on your PATH."
          prerelease: true
          files: cli/rust/target/x86_64-pc-windows-msvc/release/physmind.exe
