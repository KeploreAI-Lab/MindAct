      #     VERSION="${GITHUB_REF_NAME#v}"
      #     FILE=$(find dist-electron -maxdepth 1 \( -name "*.zip" -o -name "*.dmg" \) | sort | head -1)
      #     [ -z "$FILE" ] && echo "ERROR: No .zip or .dmg found" && exit 1
      #     curl -s -o /tmp/upload.json -w "%{http_code}" -X POST \
      #       -H "Authorization: Bearer $REGISTRY_TOKEN" \
      #       -F "metadata={\"version\":\"$VERSION\",\"platform\":\"mac-arm64\",\"channel\":\"stable\"}" \
      #       -F "file=@$FILE;filename=$(basename $FILE)" \
      #       "$REGISTRY_URL/releases/upload"
      #   env:
      #     REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
      #     REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

