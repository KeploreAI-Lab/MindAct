name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'           # 打 v1.2.3 标签时自动触发
  workflow_dispatch:   # 手动触发（用于测试）
    inputs:
      upload_to_cloudflare:
        description: 'Upload release to Cloudflare (requires REGISTRY_TOKEN secret)'
        type: boolean
        default: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-13       # Intel Mac runner
            platform: mac
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Install client dependencies
        run: cd client && bun install

      # Linux: electron-builder requires rpmbuild + additional libs
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # node-gyp (used to rebuild node-pty for Electron) requires Python's distutils.
      # Python 3.12+ removed distutils; pinning to 3.11 (which still ships distutils)
      # is more reliable than trying to install setuptools on managed Python envs.
      - name: Setup Python 3.11 (node-gyp needs distutils)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prebuild (compile server + build frontend)
        run: bash scripts/prebuild.sh

      # electron-builder reads APPLE_* secrets for code signing on macOS.
      # CSC_IDENTITY_AUTO_DISCOVERY=false prevents electron-builder from picking up
      # any certificate in the system keychain (CI runners may have one) and failing.
      # 注意：每个 runner 只编译自己的 arch，避免跨平台编译 node-pty 失败
      - name: Build Electron installer
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            mac)     npx electron-builder --mac     --${{ matrix.arch }} ;;
            windows) npx electron-builder --win     --${{ matrix.arch }} ;;
            linux)   npx electron-builder --linux   --${{ matrix.arch }} ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable auto-discovery of signing certificates — build unsigned
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # macOS code signing (optional — uncomment to enable notarization)
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional)
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List build output
        shell: bash
        run: ls -lh dist-electron/ 2>/dev/null || echo "(no output files yet)"

      - name: Upload installer as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindact-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
            dist-electron/*.AppImage
          retention-days: 30

      # ── 上传到 Cloudflare Release 系统 ──────────────────────────────────────
      - name: Upload to Cloudflare Release (macOS arm64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64' && (github.event_name == 'push' || inputs.upload_to_cloudflare)
        shell: bash
        run: |
          if [ -z "$REGISTRY_TOKEN" ] || [ -z "$REGISTRY_URL" ]; then
            echo "⚠️ REGISTRY_TOKEN or REGISTRY_URL not set — skipping upload. Set GitHub Secrets to enable."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          FILE=$(ls dist-electron/*.zip 2>/dev/null | head -1 || ls dist-electron/*.dmg 2>/dev/null | head -1)
          [ -z "$FILE" ] && echo "No release file found" && exit 1
          FILENAME=$(basename "$FILE")
          echo "Uploading $FILENAME as v$VERSION / mac-arm64..."
          TMPFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -F "metadata={\"version\":\"$VERSION\",\"platform\":\"mac-arm64\",\"channel\":\"stable\",\"release_notes\":\"Release $VERSION\"}" \
            -F "file=@$FILE;filename=$FILENAME" \
            "$REGISTRY_URL/releases/upload")
          echo "Upload response (HTTP $HTTP_CODE):"; cat "$TMPFILE"; rm -f "$TMPFILE"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || exit 1
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

      - name: Upload to Cloudflare Release (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64' && (github.event_name == 'push' || inputs.upload_to_cloudflare)
        shell: bash
        run: |
          if [ -z "$REGISTRY_TOKEN" ] || [ -z "$REGISTRY_URL" ]; then
            echo "⚠️ REGISTRY_TOKEN or REGISTRY_URL not set — skipping upload."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          FILE=$(ls dist-electron/*.zip 2>/dev/null | head -1 || ls dist-electron/*.dmg 2>/dev/null | head -1)
          [ -z "$FILE" ] && echo "No release file found" && exit 1
          FILENAME=$(basename "$FILE")
          echo "Uploading $FILENAME as v$VERSION / mac-x64..."
          TMPFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -F "metadata={\"version\":\"$VERSION\",\"platform\":\"mac-x64\",\"channel\":\"stable\",\"release_notes\":\"Release $VERSION\"}" \
            -F "file=@$FILE;filename=$FILENAME" \
            "$REGISTRY_URL/releases/upload")
          echo "Upload response (HTTP $HTTP_CODE):"; cat "$TMPFILE"; rm -f "$TMPFILE"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || exit 1
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

      - name: Upload to Cloudflare Release (Windows)
        if: matrix.platform == 'windows' && (github.event_name == 'push' || inputs.upload_to_cloudflare)
        shell: bash
        run: |
          if [ -z "$REGISTRY_TOKEN" ] || [ -z "$REGISTRY_URL" ]; then
            echo "⚠️ REGISTRY_TOKEN or REGISTRY_URL not set — skipping upload."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          FILE=$(ls dist-electron/*.exe 2>/dev/null | head -1)
          [ -z "$FILE" ] && echo "No exe found" && exit 1
          FILENAME=$(basename "$FILE")
          echo "Uploading $FILENAME as v$VERSION / windows..."
          TMPFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -F "metadata={\"version\":\"$VERSION\",\"platform\":\"windows\",\"channel\":\"stable\",\"release_notes\":\"Release $VERSION\"}" \
            -F "file=@$FILE;filename=$FILENAME" \
            "$REGISTRY_URL/releases/upload")
          echo "Upload response (HTTP $HTTP_CODE):"; cat "$TMPFILE"; rm -f "$TMPFILE"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || exit 1
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

      - name: Upload to Cloudflare Release (Linux)
        if: matrix.platform == 'linux' && (github.event_name == 'push' || inputs.upload_to_cloudflare)
        shell: bash
        run: |
          if [ -z "$REGISTRY_TOKEN" ] || [ -z "$REGISTRY_URL" ]; then
            echo "⚠️ REGISTRY_TOKEN or REGISTRY_URL not set — skipping upload."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          FILE=$(ls dist-electron/*.AppImage 2>/dev/null | head -1)
          [ -z "$FILE" ] && echo "No AppImage found" && exit 1
          FILENAME=$(basename "$FILE")
          echo "Uploading $FILENAME as v$VERSION / linux..."
          TMPFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -F "metadata={\"version\":\"$VERSION\",\"platform\":\"linux\",\"channel\":\"stable\",\"release_notes\":\"Release $VERSION\"}" \
            -F "file=@$FILE;filename=$FILENAME" \
            "$REGISTRY_URL/releases/upload")
          echo "Upload response (HTTP $HTTP_CODE):"; cat "$TMPFILE"; rm -f "$TMPFILE"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || exit 1
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

  # ── 所有平台构建完成后，promote 最新版本 ───────────────────────────────────────
  promote:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Promote release to latest (stable channel)
        shell: bash
        run: |
          if [ -z "$REGISTRY_TOKEN" ] || [ -z "$REGISTRY_URL" ]; then
            echo "⚠️ REGISTRY_TOKEN or REGISTRY_URL not set — skipping promote."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Promoting v$VERSION to latest..."
          TMPFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"$VERSION\"}" \
            "$REGISTRY_URL/releases/promote")
          echo "Promote response (HTTP $HTTP_CODE):"; cat "$TMPFILE"; rm -f "$TMPFILE"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || exit 1
          echo "v$VERSION is now the latest stable release."
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
