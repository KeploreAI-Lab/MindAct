appId: com.keploreai.mindact
productName: MindAct
copyright: Copyright © 2026 KeploreAI

# electron-builder 自动将 PNG 转为 .icns (macOS) 和 .ico (Windows)
icon: build-resources/icon.png

directories:
  output: dist-electron
  buildResources: build-resources

# electron-main.cjs 作为 Electron 主进程入口（已在 package.json main 字段中声明）
# beforeBuild 由 CI 中的 prebuild.sh 手动执行，electron-builder 不自动调用 shell 脚本
files:
  - electron-main.cjs
  - preload.cjs
  - package.json
  - node_modules/**/*

# 原生模块（node-pty）必须解包，不能放进 asar
# @keploreai/physmind 必须解包：pty-worker 通过 pty.spawn(electron, [cli.js]) 运行它，
# 操作系统级进程创建需要真实文件路径（不能是 asar 虚拟路径）
asarUnpack:
  - "**/*.node"
  - "**/node_modules/node-pty/**"
  - "**/node_modules/@keploreai/physmind/**"

# 额外资源（放到 Resources/ 目录，server 二进制运行时通过 process.resourcesPath 访问）
# mindact-server 由 prebuild.sh 生成（bun build --compile server.ts --outfile mindact-server）
# 打包前必须先运行 bash scripts/prebuild.sh
extraResources:
  - from: pty-worker.cjs
    to: pty-worker.cjs
  - from: client/dist
    to: client/dist

# 自动更新服务器地址（Cloudflare worker 提供 latest-*.yml）
publish:
  provider: generic
  url: https://registry.physical-mind.ai/releases/electron

# macOS — server binary 无扩展名
# arch 不在 YAML 中指定，完全由 CLI --arm64 / --x64 控制，避免交叉编译 node-pty 失败
# identity: null 跳过代码签名（无 Apple Developer 证书时必须设置，否则 electron-builder
# 会留下不完整签名导致 macOS 报"已损坏"）。
# afterSign 钩子对 .app 做 ad-hoc 自签名（codesign --sign -），防止 macOS Gatekeeper
# 将未签名的下载包报告为"已损坏"。用户仍需右键→打开 或 系统设置→隐私与安全 放行。
# 正式分发时改为 "Developer ID Application: <Name> (<TeamID>)" 并完成公证。
afterSign: scripts/after-sign.cjs
mac:
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false
  extraResources:
    - from: mindact-server
      to: mindact-server
  target:
    - target: dmg
    - target: zip
  category: public.app-category.developer-tools
  darkModeSupport: true

dmg:
  title: MindAct ${version}
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# Windows — bun compile 在 Windows 上强制加 .exe 扩展名
win:
  extraResources:
    - from: mindact-server.exe
      to: mindact-server.exe
  target:
    - target: nsis

nsis:
  artifactName: "${productName}-Setup-${version}.exe"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: MindAct
  shortcutName: MindAct
  uninstallDisplayName: "MindAct ${version}"
  installerSidebar: build-resources/installer-sidebar.bmp
  uninstallerSidebar: build-resources/installer-sidebar.bmp
  include: build-resources/installer.nsh

# Linux — server binary 无扩展名
linux:
  extraResources:
    - from: mindact-server
      to: mindact-server
  target:
    - target: AppImage
  category: Development
